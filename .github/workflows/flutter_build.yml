name: Flutter Multi-Platform Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.7'
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Xmx4G -Dorg.gradle.jvmargs="-Xmx4G"'

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-{{ env.FLUTTER_VERSION }}-android

      - name: Clean build cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build App Bundle
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Rename artifacts
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/WizardPlayer.apk
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/WizardPlayer.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/WizardPlayer.apk
          retention-days: 30

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/release/WizardPlayer.aab
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-{{ env.FLUTTER_VERSION }}-ios

      - name: Clean build cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

      - name: Setup CocoaPods
        run: |
          cd ios
          pod repo update --silent
          pod install --verbose
          cd ..

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build iOS for simulator
        run: flutter build ios --simulator --obfuscate --split-debug-info=build/debug_info

      - name: Package simulator build
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../WizardPlayer_Simulator.zip Runner.app

      - name: Upload iOS simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: WizardPlayer_Simulator.zip
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-{{ env.FLUTTER_VERSION }}-linux

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            libmpv-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libboost-all-dev

      - name: Clean build cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../WizardPlayer_Linux.zip .

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: WizardPlayer_Linux.zip
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-{{ env.FLUTTER_VERSION }}-windows

      - name: Clean build cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath WizardPlayer_Windows.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: WizardPlayer_Windows.zip
          retention-days: 30
