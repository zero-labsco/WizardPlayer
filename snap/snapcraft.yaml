name: wizardplayer
version: 1.0.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-wizardplayer: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.wizardplayer # adjust accordingly to your app name

apps:
  wizardplayer:
    command: wizardplayer
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-wizardplayer
parts:
  wizardplayer:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
